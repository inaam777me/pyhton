<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome to Mr.Foodie</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand logo" href="{{ url_for('index') }}">Mr.Foodie</a>
        <button class="navbar-toggler border-0 bg-transparent" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span><img src="{{ url_for('static', filename='icon/fast-food.png') }}" alt="Menu" width="30" height="30"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" aria-current="page" href="{{ url_for('index') }}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#menuList">Menu</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container-fluid">
        <div class="row row-cols-2">
            <div class="col-sm-6 col-md-8">
                <div class="box">
                    <p>You're in for a treat!<br>
                    <span id="table-No"></span></p>
                </div>
            </div>
            <div class="col-sm-6 col-md-4">
               <form action="{{ url_for('scan') }}" method="get">
                  <button class="QR" type="submit">
                    <img src="{{ url_for('static', filename='icon/icons8-qrcode.gif') }}" alt="QR Code">
                  </button>
                </form>
            </div>
        </div>
    </div>

    <form action="{{ url_for('add_selected_items') }}" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="container-fluid">
        <div class="hot-deals">
            <h2><img src="{{url_for('static', filename='icon/hot-sale.gif')}}" alt="">Hot Deals<img src="{{url_for('static', filename='icon/hot-sale.gif')}}" alt=""></h2>
            <div class="row">
                {% for deal in hot_deals %}
                <div class="col-12 col-sm-6 col-md-4 mb-4">
                    <div class="card h-100">
                        <img src="{{ url_for('static', filename='foods/' + deal.image) }}" class="card-img-top" alt="{{ deal.title }}">
                        <div class="card-body d-flex">
                            <div class="item-info">
                                <h5 class="card-title">{{ deal.title }}</h5>
                                <p class="card-text">{{ deal.description }}</p>
                            </div>
                            <div class="add_to_cart">
                                <div class="quantity-controls">
                                    <button type="button" class="btn btn-outline-secondary minus-btn" data-item-id="{{ deal.id }}">
                                        <i class="fas fa-minus"></i>
                                    </button>
                                    <input type="hidden" name="selected_items" value="{{ deal.id }}">
                                    <input type="hidden" name="quantities" class="item-quantity-input" value="0" data-item-id="{{ deal.id }}">
                                    <span class="item-quantity" data-item-id="{{ deal.id }}">0</span>
                                    <button type="button" class="btn btn-outline-primary plus-btn" data-item-id="{{ deal.id }}">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <div class="container-fluid">
        <div class="menuList" id="menuList">
            <h2><img src="{{url_for('static', filename='icon/hot-sale.gif')}}" alt="">Menu<img src="{{url_for('static', filename='icon/hot-sale.gif')}}" alt=""></h2>
            <div class="row">
                {% for regular in regular_items %}
                <div class="col-12 col-sm-6 col-md-4 mb-4">
                    <div class="card h-100">
                        <img src="{{ url_for('static', filename='foods/' + regular.image) }}" class="card-img-top" alt="{{ regular.title }}">
                        <div class="card-body d-flex">
                            <div class="item-info">
                                <h5 class="card-title">{{ regular.title }}</h5>
                                <p class="card-text">{{ regular.description }}</p>
                            </div>
                            <div class="add_to_cart">
                                <div class="quantity-controls">
                                    <button type="button" class="btn btn-outline-secondary minus-btn" data-item-id="{{ regular.id }}">
                                        <i class="fas fa-minus"></i>
                                    </button>
                                    <input type="hidden" name="selected_items" value="{{ regular.id }}">
                                    <input type="hidden" name="quantities" class="item-quantity-input" value="0" data-item-id="{{ regular.id }}">
                                    <span class="item-quantity" data-item-id="{{ regular.id }}">0</span>
                                    <button type="button" class="btn btn-outline-primary plus-btn" data-item-id="{{ regular.id }}">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <div class="fixed-submit-btn">
        <button type="submit" class="btn btn-success">
            <i class="fas fa-shopping-cart"></i>
            <span class="quantity-badge">0</span>
        </button>
    </div>
</form>

    <script src="{{ url_for('static', filename='scripts/home.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
